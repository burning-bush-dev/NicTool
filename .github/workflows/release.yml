name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 2.41)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.38'

      - name: Extract current version
        id: current
        run: |
          VERSION=$(perl -ne "print \$1 if /\\bVERSION\\s*=\\s*'([^']+)'/" server/lib/NicToolServer.pm)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump version
        run: |
          chmod +x .release/version-bump.sh
          .release/version-bump.sh "${{ steps.current.outputs.version }}" "${{ inputs.version }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD --tags

      - name: Build distributions
        run: |
          cd client && perl Makefile.PL && make && make dist && cd ..
          cd server && perl Makefile.PL && make && make dist && cd ..
          cd server/api && perl Makefile.PL && make && make dist && cd ../..
          perl Makefile.PL && make bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: NicTool v${{ inputs.version }}
          generate_release_notes: true
          files: |
            NicTool.tar.gz
            client/NicToolClient-*.tar.gz
            server/NicToolServer-*.tar.gz
            server/api/NicTool-*.tar.gz
